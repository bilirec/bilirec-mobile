name: Integration Tests

on:
  push:
    paths:
      - "**/*.dart"
      - "**/*.kts"
      - ".github/**"
      - "**/*.so"
  pull_request:
    branches:
      - "**"
    paths:
      - "**/*.dart"
      - "**/*.kts"
      - ".github/**"
      - "**/*.so"
  workflow_dispatch:

env:
  emulator_profile: Nexus 6
  ndk_version: r28
  jdk_version: "17"
  perf_monitor_interval_seconds: 30
  perf_monitor_ram_warn_mb: 700
  perf_monitor_cpu_warn_percent: 50

jobs:
  integration-basic-functional-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: 
        api_level: [34, 36]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Environment
        uses: ./.github/actions/setup-flutter-android
        with:
          api_level: ${{ matrix.api_level }}
          jdk_version: ${{ env.jdk_version }}
          ndk_version: ${{ env.ndk_version }}
          profile: ${{ env.emulator_profile }}

      - name: Run Integration Functional Test on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api_level }}
          disable-animations: true
          target: default
          arch: x86_64
          profile: ${{ env.emulator_profile }}
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          script: |
            echo "=== 開始執行 Flutter 整合功能測試 ==="
            flutter test integration_test/basic_functional_test.dart --reporter=expanded --dart-define=CI=true

  integration-ffmpeg-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        api_level: [34, 36]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Environment
        uses: ./.github/actions/setup-flutter-android
        with:
          api_level: ${{ matrix.api_level }}
          jdk_version: ${{ env.jdk_version }}
          ndk_version: ${{ env.ndk_version }}
          profile: ${{ env.emulator_profile }}

      - name: Pre-build Debug APK
        run: flutter build apk --debug

      - name: Prepare performance monitor workspace
        run: mkdir -p .ci/perf-monitor

      - name: Run FFmpeg Integration Test on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api_level }}
          disable-animations: true
          target: default
          arch: x86_64
          profile: ${{ env.emulator_profile }}
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          script: |
            sh ./.github/scripts/run_stress_with_monitor.sh integration_test/ffmpeg_test.dart ffmpeg .ci/perf-monitor/ffmpeg.log .ci/perf-monitor/ffmpeg.summary ${{ env.perf_monitor_interval_seconds }} ${{ env.perf_monitor_ram_warn_mb }} ${{ env.perf_monitor_cpu_warn_percent }} true

      - name: Publish FFmpeg Perf Summary
        if: always()
        shell: bash
        run: |
          if [ -f .ci/perf-monitor/ffmpeg.summary ]; then
            {
              echo "### FFmpeg Integration Test Perf Monitor"
              echo ''
              cat .ci/perf-monitor/ffmpeg.summary
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload FFmpeg Perf Monitor Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-perf-monitor-api-${{ matrix.api_level }}
          path: .ci/perf-monitor/ffmpeg.*
          if-no-files-found: warn

