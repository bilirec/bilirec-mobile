name: Build APK

on:
  push:
    paths:
      - "**/*.dart"
      - "**/*.kts"
      - ".github/workflows/**"
      - "**/*.so"
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release-key.jks

      - name: Create key.properties
        run: |
          cat << EOF > android/key.properties
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release-key.jks
          EOF

      - name: Inspect Active NDK Version
        run: |
          echo "=== 🔍 檢查環境變數中的 NDK 路徑 ==="
          echo "ANDROID_NDK_HOME: $ANDROID_NDK_HOME"
          echo "ANDROID_NDK_ROOT: $ANDROID_NDK_ROOT"
          echo "ANDROID_NDK_LATEST_HOME: $ANDROID_NDK_LATEST_HOME"
          
          echo "=== 📂 檢查 GitHub 虛擬機預裝的所有 NDK 版本 ==="
          if [ -d "/usr/local/lib/android/sdk/ndk" ]; then
            ls -la /usr/local/lib/android/sdk/ndk
          else
            echo "預設 SDK 路徑下沒有發現 ndk 資料夾"
          fi
          
          echo "=== 🎯 檢查目前 Clang 編編譯器實際指向的版本 ==="
          if [ ! -z "$ANDROID_NDK_HOME" ] && [ -f "$ANDROID_NDK_HOME/source.properties" ]; then
            grep "Pkg.Revision" "$ANDROID_NDK_HOME/source.properties"
          else
            echo "無法從 ANDROID_NDK_HOME 讀取 source.properties"
          fi

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK for artifact/release
        run: cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/bilirec-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/bilirec-release.apk
          if-no-files-found: error

  upload-release:
    needs: build-apk
    if: github.event_name == 'release' && github.event.action == 'created'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release-apk
          path: dist

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/bilirec-release.apk

