name: 'Setup Flutter & Android Env'
description: '配置 KVM、Java、Flutter、NDK 並處理 AVD / system-images 快取（API 29 跳過 Create AVD）'
inputs:
  api_level:
    description: 'Android API Level'
    required: true
  jdk_version:
    description: 'JDK Version'
    required: true
  ndk_version:
    description: 'NDK Version'
    required: true
  profile:
    description: 'Emulator profile for performance testing'
    required: false
    default: 'Nexus 6'
  arch:
    description: 'Target architecture for emulator (e.g., x86_64)'
    required: false
    default: 'x86_64'
  target:
    description: 'Emulator target (e.g., default, google_apis, google_apis_playstore)'
    required: false
    default: 'default'

runs:
  using: "composite"
  steps:
    - name: Free Disk Space
      continue-on-error: true
      shell: bash
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf "/usr/local/share/boost"
        sudo docker image prune --all --force || true

    - name: Enable KVM group perms
      shell: bash
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: ${{ inputs.jdk_version }}

    - name: Gradle cache
      uses: gradle/actions/setup-gradle@v5

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable
        cache: true

    - name: Set up Android NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: ${{ inputs.ndk_version }}
        local-cache: true

    - name: Format Profile Name for Cache Key
      id: format-profile
      shell: bash
      run: |
        PROFILE_SLUG=$(echo "${{ inputs.profile }}" | tr ' ' '_')
        echo "slug=${PROFILE_SLUG}" >> $GITHUB_OUTPUT

    - name: AVD cache
      uses: actions/cache@v5
      id: avd-cache
      with:
        path: |
          ~/.android/avd/*
          ~/.android/adb*
          /usr/local/lib/android/sdk/system-images/*
        key: avd-${{ inputs.api_level }}-${{ inputs.arch }}-${{ inputs.target }}-${{ steps.format-profile.outputs.slug }}-${{ runner.os }}-v2
        restore-keys: |
          avd-${{ inputs.api_level }}-${{ inputs.arch }}-${{ inputs.target }}-${{ steps.format-profile.outputs.slug }}-${{ runner.os }}-
          avd-${{ inputs.api_level }}-${{ inputs.arch }}-${{ runner.os }}-

    - name: Report AVD cache and disk status
      shell: bash
      run: |
        echo "AVD cache hit: ${{ steps.avd-cache.outputs.cache-hit }}"
        df -h
        SYSTEM_IMAGE_DIR="/usr/local/lib/android/sdk/system-images/android-${{ inputs.api_level }}"
        if [ -d "$SYSTEM_IMAGE_DIR" ]; then
          echo "System image present: $SYSTEM_IMAGE_DIR"
          du -sh "$SYSTEM_IMAGE_DIR" || true
        else
          echo "System image not yet present: $SYSTEM_IMAGE_DIR"
        fi

    - name: Create AVD and generate snapshot
      if: steps.avd-cache.outputs.cache-hit != 'true' && inputs.api_level != '29'
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: ${{ inputs.api_level }}
        disable-animations: false
        profile: ${{ inputs.profile }}
        target: ${{ inputs.target }}
        arch: ${{ inputs.arch }}
        force-avd-creation: false
        emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
        script: echo "Generated AVD snapshot for caching."

    - name: Install Flutter Dependencies
      shell: bash
      run: flutter pub get